name: Just Audio CI

on:
  push:
    branches: [ infra/just-audio ]
  pull_request:
    branches: [ infra/just-audio ]

jobs:
  test:
    name: Test and Analyze (Just Audio)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.4'
        channel: 'stable'
        
    - name: Flutter version
      run: flutter --version
      
    - name: Disable Flutter analytics
      run: flutter config --no-analytics
      
    - name: Install dependencies
      run: flutter pub get
      
    - name: Analyze code
      run: flutter analyze
      
    - name: Run tests
      run: flutter test
      
    - name: Check formatting
      run: dart format --output=none --set-exit-if-changed lib/ test/
      
  build-test-android:
    name: Build Test Android (Just Audio)
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.4'
        channel: 'stable'

    - name: Install Android SDK components
      env:
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        ANDROID_HOME: /usr/local/lib/android/sdk
      run: |
        export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
        yes | sdkmanager --licenses
        sdkmanager --install "platforms;android-35" "build-tools;35.0.0" "platform-tools" "ndk;26.1.10909125"
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Disable Flutter analytics
      run: flutter config --no-analytics
      
    - name: Build APK (debug, standalone flavor)
      run: flutter build apk --debug --flavor standalone --dart-define=APP_FLAVOR=standalone
      
  build-test-macos:
    name: Build Test macOS (Just Audio)
    runs-on: macos-latest
    needs: test
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.4'
        channel: 'stable'
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Disable Flutter analytics
      run: flutter config --no-analytics
      
    - name: Enable macOS desktop
      run: flutter config --enable-macos-desktop
      
    - name: Build macOS app (debug)
      run: flutter build macos --debug
