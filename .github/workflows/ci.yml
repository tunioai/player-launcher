name: CI

on:
  push:
    branches: [ main, develop, fix/windows-scheduled-startup ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test and Analyze
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.4'
        channel: 'stable'
        
    - name: Flutter version
      run: flutter --version
      
    - name: Disable Flutter analytics
      run: flutter config --no-analytics
      
    - name: Install dependencies
      run: flutter pub get
      
    - name: Analyze code
      run: flutter analyze
      
    - name: Run tests
      run: flutter test
      
    - name: Check formatting
      run: dart format --output=none --set-exit-if-changed lib/ test/
      
  build-test:
    name: Build Test
    if: github.ref != 'refs/heads/fix/windows-scheduled-startup'
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.4'
        channel: 'stable'

    - name: Install Android SDK components
      env:
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        ANDROID_HOME: /usr/local/lib/android/sdk
      run: |
        export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
        yes | sdkmanager --licenses
        sdkmanager --install "platforms;android-35" "build-tools;35.0.0" "platform-tools" "ndk;26.1.10909125"
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Disable Flutter analytics
      run: flutter config --no-analytics
      
    - name: Build APK (debug, standalone flavor)
      run: flutter build apk --debug --flavor standalone --dart-define=APP_FLAVOR=standalone
      
  build-test-windows:
    name: Build Test Windows
    # Pinned to windows-2022: windows-latest (now the windows-2025 image) breaks
    # Flutter's Visual Studio detection, which then falls back to the
    # "Visual Studio 16 2019" CMake generator and fails (VS 2019 is gone).
    runs-on: windows-2022
    needs: test
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.4'
        channel: 'stable'
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Disable Flutter analytics
      run: flutter config --no-analytics
      
    - name: Enable Windows desktop
      run: flutter config --enable-windows-desktop
      
    - name: Build Windows app (debug)
      if: github.ref != 'refs/heads/fix/windows-scheduled-startup'
      run: flutter build windows --debug

    - name: Build Windows app (release branch artifact)
      if: github.ref == 'refs/heads/fix/windows-scheduled-startup'
      run: flutter build windows --release

    - name: Create Windows x64 archive
      if: github.ref == 'refs/heads/fix/windows-scheduled-startup'
      run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath build/windows/x64/runner/tunio-spot-windows-x64.zip
      shell: powershell

    - name: Upload Windows x64 artifact
      if: github.ref == 'refs/heads/fix/windows-scheduled-startup'
      uses: actions/upload-artifact@v4
      with:
        name: windows-x64-fix-build
        path: build/windows/x64/runner/tunio-spot-windows-x64.zip

  build-test-macos:
    name: Build Test macOS
    if: github.ref != 'refs/heads/fix/windows-scheduled-startup'
    runs-on: macos-latest
    needs: test

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.4'
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Disable Flutter analytics
      run: flutter config --no-analytics

    - name: Enable macOS desktop
      run: flutter config --enable-macos-desktop

    - name: Build macOS app (debug)
      run: flutter build macos --debug
