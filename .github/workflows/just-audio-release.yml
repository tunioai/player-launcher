name: Just Audio Release Build

on:
  push:
    tags:
      - 'v*-just-audio*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v1.0.6-just-audio)'
        required: true
        default: 'v1.0.6-just-audio'

jobs:
  build-android-just-audio:
    name: Build Android (Just Audio)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: infra/just-audio
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.4'
        channel: 'stable'

    - name: Install Android SDK components
      env:
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        ANDROID_HOME: /usr/local/lib/android/sdk
      run: |
        export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
        yes | sdkmanager --licenses
        sdkmanager --install "platforms;android-35" "build-tools;35.0.0" "platform-tools" "ndk;26.1.10909125"
        
    - name: Flutter version
      run: flutter --version
      
    - name: Disable Flutter analytics
      run: flutter config --no-analytics
      
    - name: Install dependencies
      run: flutter pub get
      
    - name: Analyze code
      run: flutter analyze
      
    - name: Run tests
      run: flutter test
      
    - name: Setup Android signing
      run: |
        echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > android/app/upload-keystore.jks
        echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
        echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
        echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
        echo "storeFile=upload-keystore.jks" >> android/key.properties
        
    - name: Build Android App Bundle
      run: flutter build appbundle --release
      
    - name: Build Android APK
      run: flutter build apk --release
      
    - name: Upload Android artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-builds-just-audio
        path: |
          build/app/outputs/bundle/release/app-release.aab
          build/app/outputs/flutter-apk/app-release.apk
          
  build-macos-just-audio:
    name: Build macOS (Just Audio)
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: infra/just-audio
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.4'
        channel: 'stable'
        
    - name: Flutter version
      run: flutter --version
      
    - name: Disable Flutter analytics
      run: flutter config --no-analytics
      
    - name: Install dependencies
      run: flutter pub get
      
    - name: Enable macOS desktop
      run: flutter config --enable-macos-desktop
      
    - name: Build macOS app
      run: flutter build macos --release
      
    - name: List macOS build output
      run: ls -la build/macos/Build/Products/Release/
      
    - name: Create macOS archive
      run: |
        cd build/macos/Build/Products/Release
        tar -czf tunio-spot-macos-just-audio.tar.gz "Tunio Spot.app"
        
    - name: Upload macOS artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-builds-just-audio
        path: build/macos/Build/Products/Release/tunio-spot-macos-just-audio.tar.gz
        
  create-just-audio-release:
    name: Create Just Audio Release
    needs: [build-android-just-audio, build-macos-just-audio]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Check prerequisite jobs
      run: |
        echo "All prerequisite jobs should have completed successfully"
        echo "build-android-just-audio: ${{ needs.build-android-just-audio.result }}"
        echo "build-macos-just-audio: ${{ needs.build-macos-just-audio.result }}"
      
    - name: Get version from tag
      id: get_version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "VERSION=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi
      
    - name: Download Android artifacts
      uses: actions/download-artifact@v4
      with:
        name: android-builds-just-audio
        path: ./android-builds
        
    - name: Download macOS artifacts
      uses: actions/download-artifact@v4
      with:
        name: macos-builds-just-audio
        path: ./macos-builds
        
    - name: Create Just Audio Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_version.outputs.VERSION }}
        name: Release ${{ steps.get_version.outputs.VERSION }} (Just Audio)
        body: |
          ## What's new in version ${{ steps.get_version.outputs.VERSION }}
          
          **⚠️ This is a Just Audio version built from the `infra/just-audio` branch**
          
          ### Download files:
          - **app-release.aab** - Android App Bundle for Google Play upload
          - **app-release.apk** - APK file for Android testing
          - **tunio-spot-macos-just-audio.tar.gz** - macOS application
          
          ### Installation instructions:
          
          #### Android:
          - For regular installation: download APK and install
          - For Google Play publishing: use AAB file
          
          #### macOS:
          - Extract archive and move application to Applications folder
          
          ### Changes in this version:
          - Migrated from media_kit to just_audio for improved stability
          - Enhanced failover system with better error handling
          - Faster response to stream interruptions
          - Reduced log spam during failover playback
          
          ---
          
          Built from `infra/just-audio` branch via GitHub Actions
        files: |
          ./android-builds/bundle/release/app-release.aab
          ./android-builds/flutter-apk/app-release.apk
          ./macos-builds/tunio-spot-macos-just-audio.tar.gz
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
