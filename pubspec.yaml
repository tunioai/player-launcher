name: tunio_radio_player
description: "A Flutter radio streaming application with auto-start functionality"
publish_to: 'none'

version: 1.1.2+18

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  just_audio: ^0.9.46
  audio_session: ^0.1.21
  shared_preferences: ^2.3.3
  http: ^1.2.2
  connectivity_plus: ^6.1.0
  url_launcher: ^6.3.1
  webview_flutter: ^4.7.0
  webview_flutter_android: ^3.16.0
  webview_flutter_wkwebview: ^3.23.0
  path_provider: ^2.1.4
  package_info_plus: ^8.0.2
  device_info_plus: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

# Configuration for flutter_launcher_icons
flutter_launcher_icons:
  android: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
  # Optional: adaptive icon for Android
  adaptive_icon_background: "#1A131F"
  #adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
